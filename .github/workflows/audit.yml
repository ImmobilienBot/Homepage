name: Audit (Lighthouse CI + SEO/GEO)

# Wächter bei jedem Push auf main und jedem PR. Blockiert den Cloudflare-Deploy
# NICHT (separate Pipeline) — meldet nur Regressionen bei Performance/SEO/GEO.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:

# CC pusht oft in Serie → nur der jeweils letzte Stand wird zu Ende gemessen.
concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    # Runner-Image gepinnt (nicht ubuntu-latest) → das vorinstallierte Chrome und die
    # Toolchain ändern sich nur bei bewusstem Bump, nicht unter uns weg (Prüfregel-/
    # Rendering-Drift). Update-Prozess: siehe CLAUDE.md (Audit-System).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lighthouse CI
        # @lhci/cli EXAKT gepinnt (kein ^) → bündelt Lighthouse + axe-core = die A11y-/SEO-
        # Prüfregeln. So ändern sich die Regeln nur bei bewusstem Versions-Bump.
        run: npx @lhci/cli@0.15.1 autorun

      - name: SEO/GEO audit
        run: npm run audit:seo

      - name: Marquee guard
        # Mit-JS-Sichtprüfung der Bewertungen-Marquee (is-marquee ≤ 3 s, Klonzahl =
        # Originalzahl, Klon-Wrapper display:contents, Styles identisch) auf / und /en/
        # bei 1440 + 390. Fängt die feb6ed7-Regressionsklasse (skopte CSS-Regel greift
        # nicht am JS-erzeugten Klon-Knoten) dauerhaft ab. Nutzt das vorinstallierte
        # Chrome des Runners (wie lhci) via chrome-launcher.
        run: npm run check:marquee

      - name: Upload marquee screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marquee-shots
          path: .marquee-shots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          # .lighthouseci/ ist ein Dot-Verzeichnis; upload-artifact@v4 überspringt versteckte
          # Dateien standardmäßig („No files were found") → hier explizit einschließen.
          include-hidden-files: true
          retention-days: 14
          if-no-files-found: warn
