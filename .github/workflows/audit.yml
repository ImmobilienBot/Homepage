name: Audit (Lighthouse CI + SEO/GEO)

# Wächter bei jedem Push auf main und jedem PR. Blockiert den Cloudflare-Deploy
# NICHT (separate Pipeline) — meldet nur Regressionen bei Performance/SEO/GEO.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:

# CC pusht oft in Serie → nur der jeweils letzte Stand wird zu Ende gemessen.
concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lighthouse CI
        run: npx lhci autorun

      - name: SEO/GEO audit
        run: npm run audit:seo

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 14
